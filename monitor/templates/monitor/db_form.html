<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }}数据库配置 - DB-AIOps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,.3); }
        .card {
            background: white; border-radius: 12px; max-width: 680px;
            margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,.15);
            overflow: hidden;
        }
        .card-header {
            background: #667eea; color: white;
            padding: 18px 24px; font-size: 17px; font-weight: 600;
        }
        .card-body { padding: 28px 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #374151; font-weight: 600; margin-bottom: 6px; }
        label .required { color: #ef4444; margin-left: 2px; }
        label .hint { font-size: 12px; color: #9ca3af; font-weight: normal; margin-left: 6px; }
        input[type=text], input[type=number], input[type=password], select {
            width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
            border-radius: 6px; font-size: 14px; color: #111827;
            transition: border-color .2s;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.15); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-group label { margin-bottom: 0; font-weight: normal; cursor: pointer; }
        .error-list {
            background: #fef2f2; border: 1px solid #fca5a5;
            border-radius: 6px; padding: 12px 16px; margin-bottom: 20px;
        }
        .error-list li { color: #b91c1c; font-size: 14px; margin-left: 16px; }
        .card-footer {
            border-top: 1px solid #f0f0f0; padding: 18px 24px;
            display: flex; justify-content: flex-end; gap: 12px;
        }
        .btn {
            padding: 10px 24px; border-radius: 6px; border: none;
            cursor: pointer; font-size: 14px; text-decoration: none;
            display: inline-block; transition: opacity .2s;
        }
        .btn:hover { opacity: .85; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .type-hint {
            font-size: 12px; color: #6b7280; margin-top: 5px;
            display: none; padding: 4px 8px; background: #f9fafb;
            border-radius: 4px;
        }
        .type-hint.visible { display: block; }
        .pw-hint {
            font-size: 12px; color: #6b7280; margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>{{ action }}数据库配置</h1>
</div>

<div class="card">
    <div class="card-header">{{ action }}数据库连接信息</div>
    <div class="card-body">

        {% if errors %}
        <ul class="error-list">
            {% for err in errors %}<li>{{ err }}</li>{% endfor %}
        </ul>
        {% endif %}

        <form method="post" id="dbForm">
            {% csrf_token %}

            <div class="form-group">
                <label>连接别名<span class="required">*</span>
                    <span class="hint">用于在监控大屏上显示</span>
                </label>
                <input type="text" name="name" placeholder="例如：核心交易库_主节点"
                       value="{{ form_data.name|default:config.name|default:'' }}" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>数据库类型<span class="required">*</span></label>
                    <select name="db_type" id="dbType" onchange="onTypeChange(this)">
                        <option value="">-- 请选择 --</option>
                        {% for val, label in db_type_choices %}
                        <option value="{{ val }}"
                            {% if form_data.db_type == val or config.db_type == val %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                    <div id="typeHint" class="type-hint"></div>
                </div>

                <div class="form-group">
                    <label>监控状态</label>
                    <div class="checkbox-group" style="margin-top:10px;">
                        <input type="checkbox" name="is_active" id="isActive"
                               {% if form_data.is_active or config.is_active or action == '新增' %}checked{% endif %}>
                        <label for="isActive">开启监控</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>主机 IP<span class="required">*</span></label>
                    <input type="text" name="host" placeholder="例如：192.168.1.100"
                           value="{{ form_data.host|default:config.host|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label>端口<span class="required">*</span></label>
                    <input type="number" name="port" id="portInput" placeholder="端口号"
                           value="{{ form_data.port|default:config.port|default:'' }}" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>用户名<span class="required">*</span></label>
                    <input type="text" name="username" placeholder="监控账号"
                           value="{{ form_data.username|default:config.username|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label>密码<span class="required">{% if action == '新增' %}*{% endif %}</span>
                        {% if action == '编辑' %}<span class="hint">留空则保留原密码</span>{% endif %}
                    </label>
                    <input type="password" name="password" placeholder="{% if action == '编辑' %}不修改请留空{% else %}数据库密码{% endif %}"
                           {% if action == '新增' %}required{% endif %}>
                    {% if action == '新增' %}
                    <div class="pw-hint">密码将以 AES-256-GCM 加密存储</div>
                    {% endif %}
                </div>
            </div>

            <div class="form-group">
                <label>服务名/SID/数据库名
                    <span class="hint">Oracle 必填服务名或 SID；PostgreSQL 填数据库名；其他可留空</span>
                </label>
                <input type="text" name="service_name" placeholder="Oracle: orcl | PostgreSQL: postgres"
                       value="{{ form_data.service_name|default:config.service_name|default:'' }}">
            </div>

        </form>
    </div>
    <div class="card-footer">
        <a href="{% url 'db_list' %}" class="btn btn-secondary">取消</a>
        <button type="submit" form="dbForm" class="btn btn-primary">保存配置</button>
    </div>
</div>

<script>
const DEFAULT_PORTS = {{ default_ports|safe }};
const TYPE_HINTS = {
    oracle: '需填写服务名（service_name）或 SID；驱动：oracledb thin 模式（无需 Instant Client）',
    mysql:  '兼容 MySQL 5.7 / 8.0+；驱动：pymysql',
    pgsql:  '需填写数据库名（service_name，默认 postgres）；驱动：psycopg2',
    dm:     '需安装 DM8 ODBC Driver；驱动：pyodbc',
    gbase:  '使用 MySQL 协议（pymysql），MPP 架构',
    tdsql:  '腾讯分布式数据库，MySQL 兼容模式',
};

function onTypeChange(sel) {
    const val = sel.value;
    const portInput = document.getElementById('portInput');
    const hint = document.getElementById('typeHint');

    if (val && DEFAULT_PORTS[val] && !portInput.value) {
        portInput.value = DEFAULT_PORTS[val];
    }
    if (val && TYPE_HINTS[val]) {
        hint.textContent = TYPE_HINTS[val];
        hint.classList.add('visible');
    } else {
        hint.classList.remove('visible');
    }
}

// 页面加载时触发一次，以便编辑页面显示提示
window.addEventListener('load', () => {
    const sel = document.getElementById('dbType');
    if (sel.value) onTypeChange(sel);
});
</script>
</body>
</html>
