# ==========================================
# DB Monitor - Full Stack Environment
# MySQL 8.0 + TimescaleDB (PostgreSQL) + Redis + Django App
# ==========================================

version: '3.8'

services:

  # ----------------------------------------
  # Redis Cache
  # Host port: 6379
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dbmonitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dbmonitor-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # MySQL 8.0
  # Host port: 3306
  # root password: root123
  # monitor user: monitor / monitor123
  # ----------------------------------------
  mysql:
    image: mysql:8.0
    container_name: dbmonitor-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: testdb
      MYSQL_USER: monitor
      MYSQL_PASSWORD: monitor123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --slow-query-log=ON
      --long-query-time=1
    networks:
      - dbmonitor-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # TimescaleDB (PostgreSQL with time-series extensions)
  # Host port: 5432
  # User: postgres / postgres123
  # Database: timeseriesdb
  # ----------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: dbmonitor-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: timeseriesdb
    ports:
      - "5432:5432"
    volumes:
      - timeseries_data:/var/lib/postgresql/data
    networks:
      - dbmonitor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # Django Application
  # Host port: 8000
  # ----------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbmonitor-web
    environment:
      - DJANGO_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=testdb
      - DB_USER=monitor
      - DB_PASSWORD=monitor123
      - TIMESERIES_DB_HOST=timescaledb
      - TIMESERIES_DB_PORT=5432
      - TIMESERIES_DB_NAME=timeseriesdb
      - TIMESERIES_DB_USER=postgres
      - TIMESERIES_DB_PASSWORD=postgres123
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dbmonitor-net
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ----------------------------------------
  # React Frontend (Vite dev server)
  # Host port: 3000
  # ----------------------------------------
  frontend:
    image: node:18-alpine
    container_name: dbmonitor-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    networks:
      - dbmonitor-net
    depends_on:
      web:
        condition: service_started
    command: >
      sh -c "cd /app && npm install &&
             npm run dev -- --host 0.0.0.0 --port 3000"

  # ----------------------------------------
  # APScheduler / Celery Worker (Optional)
  # ----------------------------------------
  # celery-worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: dbmonitor-celery
  #   environment:
  #     - DJANGO_ENV=production
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - DB_HOST=mysql
  #     - DB_PORT=3306
  #     - DB_NAME=testdb
  #     - DB_USER=monitor
  #     - DB_PASSWORD=monitor123
  #   volumes:
  #     - .:/app
  #   depends_on:
  #     - redis
  #     - mysql
  #   networks:
  #     - dbmonitor-net
  #   command: celery -A dbmonitor worker -l info

volumes:
  mysql_data:
  timeseries_data:
  redis_data:

networks:
  dbmonitor-net:
    driver: bridge
