# ==========================================
# DB Monitor - Full Stack Environment
# MySQL 8.0 + TimescaleDB (PostgreSQL) + Redis + Django App
# ==========================================

version: '3.8'

services:

  # ----------------------------------------
  # Redis Cache
  # Host port: 6379
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dbmonitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dbmonitor-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # MySQL 8.0
  # Host port: 3306
  # root password: root123
  # monitor user: monitor / monitor123
  # ----------------------------------------
  mysql:
    image: mysql:8.0
    container_name: dbmonitor-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: testdb
      MYSQL_USER: monitor
      MYSQL_PASSWORD: monitor123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --slow-query-log=ON
      --long-query-time=1
    networks:
      - dbmonitor-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # TimescaleDB (PostgreSQL with time-series extensions)
  # Host port: 5432
  # User: postgres / postgres123
  # Database: timeseriesdb
  # ----------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: dbmonitor-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: timeseriesdb
    ports:
      - "5432:5432"
    volumes:
      - timeseries_data:/var/lib/postgresql/data
    networks:
      - dbmonitor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # Django Application
  # Host port: 8000
  # ----------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbmonitor-web
    environment:
      - DJANGO_ENV=production
      - USE_POSTGRESQL=True
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_DB=db_monitor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - TIMESCALEDB_ENABLED=True
      - TIMESCALEDB_HOST=timescaledb
      - TIMESCALEDB_PORT=5432
      - TIMESCALEDB_NAME=timeseriesdb
      - TIMESCALEDB_USER=postgres
      - TIMESCALEDB_PASSWORD=postgres123
      - ES_ENABLED=True
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dbmonitor-net
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ----------------------------------------
  # React Frontend (Vite dev server)
  # Host port: 3000
  # ----------------------------------------
  frontend:
    image: node:18-alpine
    container_name: dbmonitor-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    networks:
      - dbmonitor-net
    depends_on:
      web:
        condition: service_started
    command: >
      sh -c "cd /app && npm install &&
             npm run dev -- --host 0.0.0.0 --port 3000"

  # ----------------------------------------
  # 数据采集守护进程
  # 每5分钟采集所有数据库的指标数据
  # ----------------------------------------
  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbmonitor-collector
    environment:
      - DJANGO_ENV=production
      - USE_POSTGRESQL=True
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_DB=db_monitor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - TIMESCALEDB_ENABLED=True
      - TIMESCALEDB_HOST=timescaledb
      - TIMESCALEDB_PORT=5432
      - TIMESCALEDB_NAME=timeseriesdb
      - TIMESCALEDB_USER=postgres
      - TIMESCALEDB_PASSWORD=postgres123
      - ES_ENABLED=True
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dbmonitor-net
    command: python manage.py start_monitor
    restart: unless-stopped

  # ----------------------------------------
  # Elasticsearch 8.x - 时序指标存储
  # Host port: 9200 (HTTP API)
  # ----------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: dbmonitor-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=dbmonitor-es
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - dbmonitor-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

volumes:
  mysql_data:
  timeseries_data:
  redis_data:
  es_data:

networks:
  dbmonitor-net:
    driver: bridge
